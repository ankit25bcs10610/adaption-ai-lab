name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  offline-suites:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # The offline suites don't need the heavy ML stack — install the pinned requirements MINUS
      # torch/transformers/datasets/accelerate (huge) and the Adaption SDK (not on PyPI). The rest
      # (numpy, jsonschema, pyyaml, datasketch, model2vec, scikit-learn, matplotlib, Pillow, …) is light.
      - name: Install offline-test deps
        run: |
          python -m pip install --upgrade pip
          grep -viE '^(torch|transformers|datasets|accelerate|adaption)([=<>~! ]|$)' requirements.txt > ci-requirements.txt
          pip install -r ci-requirements.txt

      - name: Function-calling suite (165 checks)
        run: python -m tests.smoke_test

      - name: Data-visualization suite (57 checks)
        run: python -m tests.viz.test_viz
