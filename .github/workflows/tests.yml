name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  offline-suites:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # The offline suites lazily import heavy deps (torch/transformers/datasets/adaption),
      # so only numpy is needed to exercise the correctness-critical logic.
      - name: Install minimal deps
        run: python -m pip install --upgrade pip numpy

      - name: Function-calling suite (154 checks)
        run: python -m tests.smoke_test

      - name: Data-visualization suite (57 checks)
        run: python -m tests.viz.test_viz
