name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  offline-suites:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # The offline suites don't need the heavy ML stack — install the pinned requirements MINUS
      # torch/transformers/datasets/accelerate (huge) and the Adaption SDK (not on PyPI). The rest
      # (numpy, jsonschema, pyyaml, datasketch, model2vec, scikit-learn, matplotlib, Pillow, …) is light.
      - name: Install offline-test deps
        run: |
          python -m pip install --upgrade pip
          grep -viE '^(torch|transformers|datasets|accelerate|adaption)([=<>~! ]|$)' requirements.txt > ci-requirements.txt
          pip install -r ci-requirements.txt

      - name: Function-calling suite
        run: python -m tests.smoke_test

      - name: Data-visualization suite
        run: python -m tests.viz.test_viz

      # data/ and results/ are gitignored, so CI can't verify a built-dataset manifest — but the CARDS
      # are committed. Lint the release cards for stray placeholders (the FC cards must be fully clean;
      # the viz MODEL card is expected to keep __PENDING__ until the VLM run, so it's not linted here).
      - name: Release card lint (no unfilled placeholders in the ready cards)
        run: python -m autoscientist_toolcaller.release lint-cards --cards MODEL_CARD.md DATASET_CARD.md VIZ_DATASET_CARD.md
