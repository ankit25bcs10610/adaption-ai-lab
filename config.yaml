# Central config. Everything reads from here so a reviewer can reproduce from one file.

seed: 42

base_model: Qwen/Qwen2.5-Coder-3B-Instruct   # natural fit; small enough for a weak public baseline

dataset:
  # Permissively licensed sources ONLY (clean for open release).
  sources:
    xlam:
      repo: Salesforce/xlam-function-calling-60k   # CC-BY-4.0 (⚠ re-verify: history of NC→BY flip)
      max_examples: 4000
      enabled: false                                # gated on HF; skip unless you've accepted terms + HF_TOKEN
    toolace:
      repo: Team-ACE/ToolACE                        # Apache-2.0 (clean)
      max_examples: 3000
    toucan:
      repo: Agent-Ark/Toucan-1.5M                   # Apache-2.0 — largest permissive tool-agentic set
      config: SFT                                    # required config (SFT | Qwen3 | OSS | Kimi-K2)
      max_examples: 2000
      enabled: false                                # opt-in: STREAMS ~max_examples rows (flip on for scale)
  target_positive: 3500        # curated positive (tool-should-be-called) examples
  # Research-backed mix: ~10% irrelevance is the swept optimum (more degrades positive calling).
  # Shares are SHARED-denominator (see build_dataset step 3): realized ≈ intended, so with
  # hard_negative_ratio 0.22 and no_tool kind-weight ~0.5, no_tool lands at ~11% of the TOTAL set.
  hard_negative_ratio: 0.22    # no_tool + missing_arg + ambiguous (refuse/clarify moat)
  multiturn_ratio: 0.20        # multi-turn is ~30% of BFCL v4 and where small fine-tunes beat GPT-4o
  schema_drift_ratio: 0.08     # distinctive originality slice: tool schemas that changed under the model
  multilingual_examples: 150   # matched en/hi/hi-romanized tool-calling twins (Adaptive Data 242-lang lever)
  env_examples: 300            # execution-verified examples from autoscientist_toolcaller.envs (correct-by-construction)
  env_multicall_frac: 0.3      # of env_examples, fraction that are verified 2-3 call trajectories
  env_dpo: 200                 # execution-labeled DPO pairs from autoscientist_toolcaller.envs merged into pref.jsonl
  agentic_examples: 200        # agentic MULTI-STEP trajectory steps (observation-in-the-loop; correct-by-construction)
  agentic_trajectories: 60     # full trajectory objects written for the agentic eval (trajectory-success + per-step)
  agentic_dpo: 150             # execution-labeled trajectory-STEP preference pairs merged into pref.jsonl
  novel_tool_frac: 0.15        # hold out 15% of tool NAMES; examples using only them -> test_novel
  reasoning_traces: false      # prepend correct-by-construction <think> traces to train_pc (A/B arm;
                               # if ON, do NOT also enable the platform reasoning_traces recipe)
  llm_synth_examples: 0        # opt-in: Anthropic generate→critique→schema-verify→dedup hard cases (needs ANTHROPIC_API_KEY)
  quality_keep_frac: 1.0       # keep top X of positives after quality filter (1.0 = filter off)
  quality_judge: heuristic     # heuristic (offline) | claude (Anthropic SDK LLM-as-judge)
  quality_judge_model: claude-opus-4-8  # used when quality_judge=claude (haiku for cheaper bulk scoring)
  splits:
    train: 0.85
    val: 0.10
    test: 0.05

hard_negatives:
  kinds:                       # relative weights across the failure modes (within the HN slice)
    no_tool: 0.45              # no available tool can satisfy the request -> refuse (the irrelevance lever)
    missing_arg: 0.14          # required argument absent -> ask for it (clarify)
    ambiguous: 0.10            # two plausible tools -> disambiguate (clarify)
    over_refusal: 0.15         # hedged BUT satisfiable -> MUST call (counterweight to refusal bias)
    partial_parallel: 0.16     # two intents in one request -> gold is TWO calls (BFCL v4 weights parallel/agentic)

multiturn:
  kinds:                       # BFCL v3/v4 multi-turn failure modes (v4 is ~30% multi-turn + 40% agentic)
    miss_param: 0.35           # user never supplies a required arg -> clarify
    miss_func: 0.30            # needed tool provided only mid-conversation -> then call
    long_context: 0.35         # correct tool buried among many distractors -> select correctly (agentic-ish)
  long_context_size: 10        # number of distractor tools in long_context examples

schema_drift:
  kinds:                       # how the tool schema drifted out from under the model
    add_required: 0.4          # a new required param appeared -> clarify
    retype_enum: 0.3           # a param gained an enum the query violates -> clarify
    rename: 0.3                # a required param was renamed -> call with the new name

dedup:
  minhash_threshold: 0.85      # Jaccard threshold for lexical near-dupes
  semantic_threshold: 0.90     # cosine threshold for paraphrase near-dupes
  check_cross_split: true      # kill train/val/test leakage (silent score inflator)
  decontaminate: true          # drop train rows overlapping public BFCL/ToolACE-style probes
  decontam_ngram_threshold: 0.6   # n-gram Jaccard vs a probe -> contaminated
  decontam_cos_threshold: 0.92    # semantic cosine vs a probe -> contaminated
  # decontam_probes: path/to/probes.jsonl  # optional; defaults to the built-in fixture

dpo:                           # optional local DPO pass over the SFT checkpoint (TRL; needs a GPU)
  beta: 0.1                     # DPO temperature / KL strength (lower = trust the reference model less)
  learning_rate: 5.0e-6
  epochs: 1.0
  per_device_batch_size: 2
  grad_accum: 8                 # effective batch = per_device_batch_size * grad_accum
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05

adaption:
  column_mapping:
    prompt: prompt
    completion: completion
  # job_specification is documented inline in train_adaption.py

eval:
  max_new_tokens: 512
  temperature: 0.0             # greedy; identical decoding for base and finetuned (fairness)
  batch_size: 8

paths:
  data_dir: data
  raw_dir: data/raw
  out_dir: data/out
  results_dir: results
